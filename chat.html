<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGENT - Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0a12;
    color: #e8e8f0;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
  }

  .stars-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-opacity); transform: scale(1.2); }
  }

  .shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1));
    border-radius: 50%;
    opacity: 0;
    animation: shoot var(--shoot-duration) linear infinite;
    animation-delay: var(--shoot-delay);
  }

  @keyframes shoot {
    0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) translateX(50px) scale(0.5); opacity: 0; }
  }

  .header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding: 0.5rem 0;
  }

  .header .logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .back {
    font-size: 0.85rem;
    color: #64748b;
    text-decoration: none;
    transition: color 0.2s;
  }

  .header .back:hover {
    color: #a78bfa;
  }

  .chat-box {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 1.5rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    gap: 1rem;
    min-height: 60vh;
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    min-height: 200px;
  }

  .msg {
    padding: 0.8rem 1.2rem;
    border-radius: 14px;
    max-width: 85%;
    font-size: 0.95rem;
    line-height: 1.6;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(96, 165, 250, 0.12);
    border: 1px solid rgba(96, 165, 250, 0.2);
    color: #bfdbfe;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(52, 211, 153, 0.08);
    border: 1px solid rgba(52, 211, 153, 0.15);
    color: #a7f3d0;
  }

  .msg.bot .reasoning {
    color: #94a3b8;
    font-style: italic;
    border-right: 2px solid rgba(148, 163, 184, 0.3);
    padding-right: 0.8rem;
    margin-bottom: 0.5rem;
    display: block;
  }

  .msg.bot .content {
    display: block;
  }

  .input-area {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 0.4rem 0.4rem 0.4rem 1rem;
  }

  .input-area textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e8e8f0;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    padding: 0.6rem 0;
    line-height: 1.5;
  }

  .input-area textarea::placeholder {
    color: #64748b;
  }

  .input-area textarea:disabled {
    opacity: 0.5;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.06);
    color: #94a3b8;
    transition: background 0.2s, color 0.2s;
    flex-shrink: 0;
  }

  .btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.12);
    color: #e2e8f0;
  }

  .btn.send {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
  }

  .btn.send:hover:not(:disabled) {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn svg {
    width: 20px;
    height: 20px;
  }

  .btn .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .file-name {
    font-size: 0.75rem;
    color: #64748b;
    padding-right: 0.5rem;
  }

  .footer {
    margin-top: 1rem;
    font-size: 0.75rem;
    color: #475569;
    text-align: center;
    z-index: 10;
  }

  @media (max-width: 640px) {
    .chat-box { padding: 1rem; border-radius: 16px; }
    .msg { max-width: 92%; font-size: 0.9rem; }
    .header .logo { font-size: 1.2rem; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="header">
  <div class="logo">IGENT</div>
  <a href="/" class="back">← الرئيسية</a>
</div>

<div class="chat-box">
  <div class="messages-area" id="messagesArea"></div>

  <div class="input-area">
    <textarea id="chatInput" rows="1" placeholder="اكتب رسالتك هنا..."></textarea>

    <button class="btn" id="uploadBtn" title="رفع ملف">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <input type="file" id="fileInput" style="display:none">

    <button class="btn send" id="sendBtn" title="إرسال">
      <svg id="sendIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="file-name" id="fileName"></div>
</div>

<div class="footer">IGENT &copy; 2026 | T.me/sii_3</div>

<script>
  const starsBg = document.getElementById('starsBg');
  const starCount = 120;

  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
    star.style.setProperty('--delay', (Math.random() * 5) + 's');
    star.style.setProperty('--max-opacity', Math.random() * 0.7 + 0.3);
    starsBg.appendChild(star);
  }

  const shootCount = 8;
  for (let i = 0; i < shootCount; i++) {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    s.style.left = Math.random() * 100 + '%';
    s.style.setProperty('--shoot-duration', (Math.random() * 4 + 6) + 's');
    s.style.setProperty('--shoot-delay', (Math.random() * 10) + 's');
    starsBg.appendChild(s);
  }

  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const messagesArea = document.getElementById('messagesArea');
  const sendIcon = document.getElementById('sendIcon');

  let isLoading = false;
  let currentBotMsg = null;
  let reasoningEl = null;
  let contentEl = null;

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(chatInput.value.trim());
    }
  });

  sendBtn.addEventListener('click', () => sendMessage(chatInput.value.trim()));

  function setLoading(loading) {
    isLoading = loading;
    chatInput.disabled = loading;
    sendBtn.disabled = loading;
    uploadBtn.disabled = loading;
    if (loading) {
      sendIcon.style.display = 'none';
      const spinner = document.createElement('div');
      spinner.className = 'spinner';
      spinner.id = 'sendSpinner';
      sendBtn.appendChild(spinner);
    } else {
      const spinner = document.getElementById('sendSpinner');
      if (spinner) spinner.remove();
      sendIcon.style.display = 'block';
    }
  }

  function sendMessage(text) {
    if (!text || isLoading) return;

    const userMsg = document.createElement('div');
    userMsg.className = 'msg user';
    userMsg.textContent = text;
    messagesArea.appendChild(userMsg);

    chatInput.value = '';
    chatInput.style.height = 'auto';
    messagesArea.scrollTop = messagesArea.scrollHeight;

    setLoading(true);

    currentBotMsg = document.createElement('div');
    currentBotMsg.className = 'msg bot';
    messagesArea.appendChild(currentBotMsg);
    messagesArea.scrollTop = messagesArea.scrollHeight;

    const evtSource = new EventSource('/api/chat?msg=' + encodeURIComponent(text));

    evtSource.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'reasoning') {
          if (!reasoningEl) {
            reasoningEl = document.createElement('span');
            reasoningEl.className = 'reasoning';
            currentBotMsg.appendChild(reasoningEl);
          }
          reasoningEl.textContent += data.text;
          messagesArea.scrollTop = messagesArea.scrollHeight;
        } else if (data.type === 'content') {
          if (!contentEl) {
            contentEl = document.createElement('span');
            contentEl.className = 'content';
            currentBotMsg.appendChild(contentEl);
          }
          contentEl.textContent += data.text;
          messagesArea.scrollTop = messagesArea.scrollHeight;
        } else if (data.type === 'done') {
          evtSource.close();
          setLoading(false);
          currentBotMsg = null;
          reasoningEl = null;
          contentEl = null;
        } else if (data.type === 'error') {
          evtSource.close();
          setLoading(false);
          if (!contentEl) {
            contentEl = document.createElement('span');
            contentEl.className = 'content';
            currentBotMsg.appendChild(contentEl);
          }
          contentEl.textContent = '⚠️ خطأ: ' + data.text;
          currentBotMsg = null;
          reasoningEl = null;
          contentEl = null;
        }
      } catch (e) {
        console.error('Parse error:', e);
      }
    };

    evtSource.onerror = function(err) {
      evtSource.close();
      setLoading(false);
      if (currentBotMsg && !contentEl) {
        contentEl = document.createElement('span');
        contentEl.className = 'content';
        currentBotMsg.appendChild(contentEl);
        contentEl.textContent = '⚠️ فشل الاتصال بالخادم. تأكد من تشغيل app.py';
      }
      currentBotMsg = null;
      reasoningEl = null;
      contentEl = null;
    };
  }

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', function() {
    if (this.files && this.files[0]) {
      fileName.textContent = 'الملف المرفوع: ' + this.files[0].name;
    }
  });

  // Send first message from landing page automatically
  const firstMsg = localStorage.getItem('igent_first_msg');
  if (firstMsg) {
    localStorage.removeItem('igent_first_msg');
    sendMessage(firstMsg);
  }
</script>

</body>
</html>
